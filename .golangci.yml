version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - misspell
    - staticcheck
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (*os.File).Close
        - os.RemoveAll

formatters:
  enable:
    - gofmt
