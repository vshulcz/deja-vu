name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - run: go mod verify
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/deja

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Build all release targets
        run: |
          for os in darwin linux windows; do
            for arch in amd64 arm64; do
              echo "== $os/$arch"
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -o /dev/null ./cmd/deja
            done
          done
