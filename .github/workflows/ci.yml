name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 5 * * 1'   # weekly canary against fresh runner images

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false
      - run: go mod verify
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        shell: bash
      - run: go build ./cmd/deja
      - name: Coverage summary
        if: runner.os == 'Linux'
        run: go tool cover -func=coverage.out | tail -1

  e2e:
    name: e2e smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false
      - run: sh scripts/e2e.sh

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false
      - name: Build all release targets
        run: |
          for os in darwin linux windows; do
            for arch in amd64 arm64; do
              echo "== $os/$arch"
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -o /dev/null ./cmd/deja
            done
          done

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  release-check:
    name: goreleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean --skip=publish
      - run: node --check scripts/release-npm.mjs

  scripts:
    name: shellcheck + actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck install.sh scripts/e2e.sh
      - name: actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint
