name: MCP Registry

on:
  # goreleaser creates the release with GITHUB_TOKEN, whose events do not
  # trigger other workflows; key off the tag push instead, plus a manual run.
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Resolve the release version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName)"
          fi
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - name: Wait for the npm package to land
        run: |
          version="${{ steps.ver.outputs.version }}"
          for _ in $(seq 1 30); do
            if curl -fsSL "https://registry.npmjs.org/@vshulcz/deja-vu/${version}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 30
          done
          echo "npm package ${version} not visible yet" >&2
          exit 1
      - name: Stamp the release version into server.json
        run: |
          version="${{ steps.ver.outputs.version }}"
          python3 - "$version" <<'PY'
          import json, sys
          version = sys.argv[1]
          with open("server.json") as f:
              manifest = json.load(f)
          manifest["version"] = version
          for pkg in manifest.get("packages", []):
              pkg["version"] = version
          with open("server.json", "w") as f:
              json.dump(manifest, f, indent=2)
          PY
      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz | tar xz
          sudo mv mcp-publisher /usr/local/bin/
      - name: Publish to the MCP registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
